---
layout: default
---

<div class="homepage-layout">
  <div class="homepage-main">
    <article class="post">
      <h1>{{ page.title }}</h1>

      <div class="entry">
        {{ content }}
      </div>

      <div class="date">
        Written on {{ page.date | date: "%B %e, %Y" }}
      </div>

      {% if page.tags.size > 0 %}
      <div class="tags">
        Tags: {% for tag in page.tags %}<a href="{{ site.baseurl }}/tags/{{ tag | slugify }}/">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}{% endfor %}
      </div>
      {% endif %}

    </article>
  </div>

  {% include sidebar.html %}
</div>
